name: Evals

on:
  pull_request:

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest evals/tests
      - run: npm test --prefix .pi/extensions/house-hunt-browser
